<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CR Engagement Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #171717;
  --surface2: #1f1f1f;
  --border: #2a2a2a;
  --border2: #333;
  --text: #e8e8e8;
  --text2: #888;
  --text3: #555;
  --accent: #c8b88a;
  --accent2: #8a9eb8;
  --red: #c0504d;
  --amber: #c8923a;
  --green: #5a8a5a;
  --purple: #7a6a9a;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; line-height: 1.6; min-height: 100vh; }

/* Layout */
.app { display: grid; grid-template-rows: auto 1fr; min-height: 100vh; }
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 52px; position: sticky; top: 0; z-index: 100; }
.topbar-left { display: flex; align-items: center; gap: 2rem; }
.logo { font-family: var(--mono); font-size: 12px; color: var(--accent); letter-spacing: 0.1em; font-weight: 500; }
.nav { display: flex; gap: 0; }
.nav-btn { font-family: var(--sans); font-size: 12px; padding: 0 16px; height: 52px; background: transparent; border: none; border-bottom: 2px solid transparent; color: var(--text2); cursor: pointer; letter-spacing: 0.02em; transition: color 0.15s; }
.nav-btn:hover { color: var(--text); }
.nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.sync-status { font-family: var(--mono); font-size: 10px; color: var(--text3); }
.sync-status.ok { color: var(--green); }
.sync-status.err { color: var(--red); }
.main { padding: 2rem; max-width: 1200px; margin: 0 auto; width: 100%; }

/* Buttons */
.btn { font-family: var(--sans); font-size: 12px; padding: 7px 16px; border: 1px solid var(--border2); border-radius: 3px; background: transparent; color: var(--text); cursor: pointer; transition: all 0.15s; letter-spacing: 0.02em; }
.btn:hover { border-color: var(--accent); color: var(--accent); }
.btn-accent { border-color: var(--accent); color: var(--accent); }
.btn-accent:hover { background: var(--accent); color: var(--bg); }
.btn-danger { border-color: var(--red); color: var(--red); }
.btn-danger:hover { background: var(--red); color: #fff; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Views */
.view { display: none; }
.view.active { display: block; }

/* Tracker */
.tracker-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.tracker-header h2 { font-size: 16px; font-weight: 400; color: var(--text); letter-spacing: 0.02em; }
.filters { display: flex; gap: 6px; margin-bottom: 1.5rem; flex-wrap: wrap; }
.filter-btn { font-family: var(--mono); font-size: 10px; padding: 4px 12px; border-radius: 2px; border: 1px solid var(--border); background: transparent; cursor: pointer; color: var(--text3); letter-spacing: 0.05em; transition: all 0.15s; }
.filter-btn:hover { border-color: var(--border2); color: var(--text2); }
.filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(200,184,138,0.06); }

/* Cards */
.projects { display: flex; flex-direction: column; gap: 8px; }
.project-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; transition: border-color 0.15s; }
.project-card:hover { border-color: var(--border2); }
.card-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; }
.stage-pill { font-family: var(--mono); font-size: 9px; padding: 3px 8px; border-radius: 2px; font-weight: 500; letter-spacing: 0.08em; white-space: nowrap; }
.pill-proposal { background: rgba(122,106,154,0.15); color: #a090c8; border: 1px solid rgba(122,106,154,0.3); }
.pill-active { background: rgba(90,138,90,0.15); color: #7ab87a; border: 1px solid rgba(90,138,90,0.3); }
.pill-delivery { background: rgba(200,146,58,0.15); color: #c8923a; border: 1px solid rgba(200,146,58,0.3); }
.pill-closed { background: rgba(80,80,80,0.2); color: #666; border: 1px solid rgba(80,80,80,0.3); }
.card-name { flex: 1; font-size: 13px; color: var(--text); font-weight: 400; }
.card-client { font-size: 11px; color: var(--text3); }
.deadline-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.card-deadline { font-family: var(--mono); font-size: 10px; color: var(--text3); white-space: nowrap; }
.chevron { font-size: 10px; color: var(--text3); transition: transform 0.2s; }
.chevron.open { transform: rotate(180deg); }

/* Card body */
.card-body { border-top: 1px solid var(--border); padding: 20px; display: none; }
.card-body.open { display: block; }
.sec { margin-bottom: 20px; }
.sec:last-child { margin-bottom: 0; }
.sec-label { font-family: var(--mono); font-size: 9px; color: var(--text3); letter-spacing: 0.12em; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
.fg { display: grid; gap: 8px; margin-bottom: 8px; }
.fg-2 { grid-template-columns: 1fr 1fr; }
.fg-3 { grid-template-columns: 1fr 1fr 1fr; }
.fg-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-family: var(--mono); font-size: 9px; color: var(--text3); letter-spacing: 0.06em; }
.field input, .field select, .field textarea {
  font-family: var(--sans); font-size: 12px; padding: 6px 8px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 3px; color: var(--text); width: 100%;
  transition: border-color 0.15s;
}
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
.field input:disabled { opacity: 0.35; cursor: not-allowed; }
.field select option { background: var(--surface2); }
.field textarea { resize: vertical; min-height: 52px; line-height: 1.5; }

/* Checkboxes */
.checks { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 4px; }
.check { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text2); cursor: pointer; }
.check input[type=checkbox] { width: 12px; height: 12px; accent-color: var(--accent); cursor: pointer; }
.check.on { color: var(--green); }

/* Subcon */
.subcon-block { background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; padding: 14px; margin-bottom: 8px; position: relative; }
.subcon-num { font-family: var(--mono); font-size: 9px; color: var(--text3); letter-spacing: 0.08em; margin-bottom: 10px; }
.subcon-remove { position: absolute; top: 12px; right: 12px; font-size: 10px; color: var(--text3); cursor: pointer; background: none; border: none; font-family: var(--mono); }
.subcon-remove:hover { color: var(--red); }
.add-subcon { width: 100%; padding: 8px; border: 1px dashed var(--border); border-radius: 3px; background: transparent; color: var(--text3); font-size: 11px; cursor: pointer; text-align: left; margin-top: 4px; transition: all 0.15s; }
.add-subcon:hover { border-color: var(--border2); color: var(--text2); }

/* Billing conditional */
.billing-sub { margin-top: 8px; padding: 10px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 3px; }
.billing-sub p { font-size: 11px; color: var(--text2); margin-bottom: 8px; }

/* Card actions */
.card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
.save-indicator { font-family: var(--mono); font-size: 10px; color: var(--text3); }
.save-indicator.saving { color: var(--amber); }
.save-indicator.saved { color: var(--green); }

/* Dashboard */
.dash-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; }
.dash-header h2 { font-size: 16px; font-weight: 400; }
.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.dash-card { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 20px; }
.dash-card.full { grid-column: 1 / -1; }
.dash-card-title { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.1em; margin-bottom: 16px; }

/* Stage bars */
.stage-bars { display: flex; flex-direction: column; gap: 10px; }
.sbar { display: flex; align-items: center; gap: 12px; }
.sbar-label { font-size: 11px; color: var(--text2); width: 60px; flex-shrink: 0; }
.sbar-track { flex: 1; height: 4px; background: var(--surface2); border-radius: 2px; overflow: hidden; }
.sbar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
.sbar-count { font-family: var(--mono); font-size: 11px; color: var(--text2); width: 20px; text-align: right; }

/* Timeline */
.tl-list { display: flex; flex-direction: column; gap: 6px; }
.tl-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: var(--surface2); border-radius: 3px; }
.tl-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.tl-name { flex: 1; font-size: 12px; color: var(--text); }
.tl-type { font-family: var(--mono); font-size: 9px; color: var(--text3); letter-spacing: 0.05em; }
.tl-date { font-family: var(--mono); font-size: 10px; color: var(--text2); }
.tl-days { font-family: var(--mono); font-size: 10px; font-weight: 500; white-space: nowrap; }

/* Flags */
.flag-list { display: flex; flex-direction: column; gap: 6px; }
.flag-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px 10px; background: var(--surface2); border-radius: 3px; }
.flag-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--red); flex-shrink: 0; margin-top: 5px; }
.flag-text { font-size: 11px; color: var(--text); line-height: 1.5; }
.flag-eng { font-size: 10px; color: var(--text3); font-family: var(--mono); }

/* SC table */
.sc-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th { font-family: var(--mono); font-size: 9px; color: var(--text3); letter-spacing: 0.08em; text-align: left; padding: 0 10px 8px 0; border-bottom: 1px solid var(--border); white-space: nowrap; }
td { font-size: 11px; color: var(--text); padding: 8px 10px 8px 0; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
.sc-pill { font-family: var(--mono); font-size: 9px; padding: 2px 7px; border-radius: 2px; }
.sc-yes { background: rgba(90,138,90,0.15); color: #7ab87a; }
.sc-no { background: rgba(192,80,77,0.15); color: #d07070; }

/* Empty */
.empty { text-align: center; padding: 3rem; color: var(--text3); font-size: 13px; border: 1px dashed var(--border); border-radius: 4px; }

/* Digest bar */
.digest-bar { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 14px 20px; margin-bottom: 1.5rem; }
.digest-info { font-size: 12px; color: var(--text2); }
.digest-info strong { color: var(--accent); font-weight: 400; }

/* Loading */
.loading { text-align: center; padding: 3rem; color: var(--text3); font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border2); border-radius: 3px; padding: 10px 16px; font-size: 12px; color: var(--text); z-index: 999; opacity: 0; transform: translateY(8px); transition: all 0.2s; pointer-events: none; font-family: var(--mono); }
.toast.show { opacity: 1; transform: translateY(0); }

@media (max-width: 768px) {
  .main { padding: 1rem; }
  .dash-grid { grid-template-columns: 1fr; }
  .fg-4 { grid-template-columns: 1fr 1fr; }
  .fg-3 { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">CR // TRACKER</div>
      <nav class="nav">
        <button class="nav-btn active" onclick="switchTab('tracker',this)">Engagements</button>
        <button class="nav-btn" onclick="switchTab('dashboard',this)">Dashboard</button>
      </nav>
    </div>
    <div class="topbar-right">
      <span class="sync-status" id="syncStatus">connecting...</span>
      <button class="btn btn-accent" onclick="addProject()">+ New</button>
    </div>
  </div>

  <div class="main">
    <div class="view active" id="view-tracker">
      <div class="tracker-header">
        <h2>Active engagements</h2>
      </div>
      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all',this)">ALL</button>
        <button class="filter-btn" onclick="setFilter('Proposal',this)">PROPOSAL</button>
        <button class="filter-btn" onclick="setFilter('Active',this)">ACTIVE</button>
        <button class="filter-btn" onclick="setFilter('Delivery',this)">DELIVERY</button>
        <button class="filter-btn" onclick="setFilter('Closed',this)">CLOSED</button>
      </div>
      <div id="projectList"><div class="loading">LOADING ENGAGEMENTS...</div></div>
    </div>

    <div class="view" id="view-dashboard">
      <div class="digest-bar">
        <div class="digest-info"><strong>Monday digest</strong> — scheduled 08:00 via Gmail &nbsp;·&nbsp; Deadline alerts fire at 10:00 on due dates</div>
        <button class="btn" id="digestBtn" onclick="sendDigest()">Send digest now</button>
      </div>
      <div class="dash-grid" id="dashGrid"><div class="loading" style="grid-column:1/-1">LOADING DASHBOARD...</div></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbwkFfqxKIgFlqea0Q68OMsDN32VN36VpNcdkIGQ1DezMinJJaKxmcCfpLqi_9LbHu22/exec';
let projects = [];
let nextId = 1;
let currentFilter = 'all';
let saveTimers = {};

async function apiFetch(params) {
  const url = API + '?' + new URLSearchParams(params);
  const r = await fetch(url);
  return r.json();
}

async function apiPost(body) {
  const r = await fetch(API, { method:'POST', body: JSON.stringify(body) });
  return r.json();
}

async function loadAll() {
  setSyncStatus('syncing...', '');
  try {
    const data = await apiFetch({ action:'getAll' });
    projects = data.map(fixTypes);
    if (projects.length) nextId = Math.max(...projects.map(p=>Number(p.id)||0)) + 1;
    setSyncStatus('synced', 'ok');
    render();
    if (document.getElementById('view-dashboard').classList.contains('active')) renderDashboard();
  } catch(e) {
    setSyncStatus('offline', 'err');
    render();
  }
}

function fixTypes(p) {
  const bools = ['sharepointMade','sc1Briefed','sc1InvReceived','sc1InvProcessed','sc2Briefed','sc2InvReceived','sc2InvProcessed','dbUsed','dbPoRequired','billingReady','invoiceInitiated'];
  bools.forEach(k => { p[k] = p[k]==='TRUE'||p[k]===true||p[k]==='true'; });
  return p;
}

function setSyncStatus(msg, cls) {
  const el = document.getElementById('syncStatus');
  el.textContent = msg; el.className = 'sync-status' + (cls ? ' '+cls : '');
}

async function saveProject(id) {
  const p = projects.find(x=>x.id==id);
  if (!p) return;
  const ind = document.getElementById('save-'+id);
  if (ind) { ind.textContent = 'saving...'; ind.className = 'save-indicator saving'; }
  setSyncStatus('saving...','');
  try {
    await apiPost({ action:'save', data:p });
    if (ind) { ind.textContent = 'saved'; ind.className = 'save-indicator saved'; setTimeout(()=>{ if(ind) { ind.textContent=''; ind.className='save-indicator'; }},2000); }
    setSyncStatus('synced','ok');
  } catch(e) {
    if (ind) { ind.textContent='save failed'; ind.className='save-indicator'; }
    setSyncStatus('offline','err');
  }
}

function scheduleSave(id) {
  clearTimeout(saveTimers[id]);
  saveTimers[id] = setTimeout(()=>saveProject(id), 1200);
}

async function deleteProject(id) {
  if (!confirm('Delete this engagement?')) return;
  projects = projects.filter(x=>x.id!=id);
  render();
  try {
    await apiPost({ action:'delete', id:String(id) });
    setSyncStatus('synced','ok');
  } catch(e) { setSyncStatus('offline','err'); }
}

function blankProject(id) {
  return { id, name:'', client:'', stage:'Proposal', projectCode:'', slCode:'', sharepointMade:false, clientLastContact:'', interimDeadline:'', interimStatus:'Not started', finalDeadline:'', finalStatus:'Not started', nextAction:'', originator:'', clientManager:'', projectLeader:'', researcher:'', sc1Name:'', sc1Briefed:false, sc1Deliverable:'', sc1Deadline:'', sc1PO:'', sc1InvReceived:false, sc1InvProcessed:false, sc2Name:'', sc2Briefed:false, sc2Deliverable:'', sc2Deadline:'', sc2PO:'', sc2InvReceived:false, sc2InvProcessed:false, dbUsed:false, dbName:'', dbCost:'', dbPoRequired:false, dbPoNumber:'', billingReady:false, invoiceInitiated:false, notes:'' };
}

function addProject() {
  const p = blankProject(nextId++);
  projects.unshift(p);
  render();
  setTimeout(()=>{ const card=document.getElementById('card-'+p.id); if(card){ card.scrollIntoView({behavior:'smooth'}); setTimeout(()=>toggleCard(p.id),300); }},100);
}

function uf(id, field, value) {
  const p = projects.find(x=>x.id==id);
  if (p) { p[field]=value; scheduleSave(id); }
}

function daysFrom(d) { return d ? Math.ceil((new Date(d)-new Date())/86400000) : null; }
function fmtDate(d) { if(!d) return '—'; return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }
function dotColor(days) { if(days===null) return '#555'; if(days<0) return '#c0504d'; if(days<=7) return '#c8923a'; return '#5a8a5a'; }
function stageClass(s) { return {Proposal:'pill-proposal',Active:'pill-active',Delivery:'pill-delivery',Closed:'pill-closed'}[s]||'pill-proposal'; }
function statusOpts(c) { return ['Not started','In progress','Delivered','N/A'].map(s=>`<option ${c===s?'selected':''}>${s}</option>`).join(''); }
function stageOpts(c) { return ['Proposal','Active','Delivery','Closed'].map(s=>`<option ${c===s?'selected':''}>${s}</option>`).join(''); }

function chk(id, field, val, label) {
  const on = val===true||val==='TRUE'||val==='true';
  return `<label class="check ${on?'on':''}">
    <input type="checkbox" ${on?'checked':''} onchange="uf(${id},'${field}',this.checked);this.parentElement.className='check '+(this.checked?'on':'')">
    ${label}</label>`;
}

function renderCard(p) {
  const days = daysFrom(p.finalDeadline);
  const sc2Section = p.sc1Name ? `
    <div class="subcon-block" style="margin-top:8px">
      <div class="subcon-num">EXTERNAL RESOURCE 02</div>
      <button class="subcon-remove" onclick="uf(${p.id},'sc2Name','');uf(${p.id},'sc2Briefed',false);uf(${p.id},'sc2Deliverable','');uf(${p.id},'sc2Deadline','');uf(${p.id},'sc2PO','');reRender(${p.id})">remove</button>
      <div class="fg fg-2">
        <div class="field"><label>NAME / VENDOR</label><input value="${p.sc2Name||''}" onchange="uf(${p.id},'sc2Name',this.value)"></div>
        <div class="field"><label>DELIVERABLE</label><input value="${p.sc2Deliverable||''}" onchange="uf(${p.id},'sc2Deliverable',this.value)"></div>
      </div>
      <div class="fg fg-2">
        <div class="field"><label>DEADLINE</label><input type="date" value="${p.sc2Deadline||''}" onchange="uf(${p.id},'sc2Deadline',this.value)"></div>
        <div class="field"><label>PO NUMBER</label><input value="${p.sc2PO||''}" placeholder="e.g. PO-4421" onchange="uf(${p.id},'sc2PO',this.value)"></div>
      </div>
      <div class="checks">
        ${chk(p.id,'sc2Briefed',p.sc2Briefed,'Briefed & confirmed')}
        ${chk(p.id,'sc2InvReceived',p.sc2InvReceived,'Invoice received')}
        ${chk(p.id,'sc2InvProcessed',p.sc2InvProcessed,'Invoice processed')}
      </div>
    </div>` : '';

  const addSc = !p.sc1Name ? `<button class="add-subcon" onclick="uf(${p.id},'sc1Name',' ');reRender(${p.id})">+ Add external resource</button>` :
    !p.sc2Name ? `<button class="add-subcon" onclick="uf(${p.id},'sc2Name',' ');reRender(${p.id})">+ Add second external resource</button>` : '';

  const dbFields = p.dbUsed ? `<div class="fg fg-3" style="margin-top:8px">
    <div class="field"><label>DATABASE NAME</label><input value="${p.dbName||''}" placeholder="e.g. World-Check" onchange="uf(${p.id},'dbName',this.value)"></div>
    <div class="field"><label>COST (USD)</label><input value="${p.dbCost||''}" placeholder="0.00" onchange="uf(${p.id},'dbCost',this.value)"></div>
    <div class="field"><label>PO NUMBER</label><input value="${p.dbPoNumber||''}" ${!p.dbPoRequired?'disabled':''} placeholder="${p.dbPoRequired?'Required':'N/A'}" onchange="uf(${p.id},'dbPoNumber',this.value)"></div>
  </div>
  <div class="checks" style="margin-top:6px">${chk(p.id,'dbPoRequired',p.dbPoRequired,'PO required')}</div>` : '';

  const billingFields = p.billingReady ? `<div class="billing-sub">
    <p>Billing is ready — has invoice preparation been initiated with finance?</p>
    <div class="checks">${chk(p.id,'invoiceInitiated',p.invoiceInitiated,'Invoice preparation initiated with finance')}</div>
  </div>` : '';

  return `<div class="project-card" id="card-${p.id}">
    <div class="card-header" onclick="toggleCard(${p.id})">
      <span class="stage-pill ${stageClass(p.stage)}">${p.stage.toUpperCase()}</span>
      <span class="card-name">${p.name||'Untitled engagement'}</span>
      <span class="card-client">${p.client||''}</span>
      <span class="deadline-dot" style="background:${dotColor(days)}"></span>
      <span class="card-deadline">${p.finalDeadline||'—'}</span>
      <span class="chevron" id="chev-${p.id}">▾</span>
    </div>
    <div class="card-body" id="body-${p.id}">
      <div class="sec">
        <div class="sec-label">ENGAGEMENT DETAILS</div>
        <div class="fg fg-2">
          <div class="field"><label>ENGAGEMENT NAME</label><input value="${p.name||''}" onchange="uf(${p.id},'name',this.value)"></div>
          <div class="field"><label>CLIENT</label><input value="${p.client||''}" onchange="uf(${p.id},'client',this.value)"></div>
        </div>
        <div class="fg fg-3">
          <div class="field"><label>PROJECT CODE</label><input value="${p.projectCode||''}" placeholder="e.g. SGP-2024-0091" onchange="uf(${p.id},'projectCode',this.value)"></div>
          <div class="field"><label>SL CODE</label><input value="${p.slCode||''}" placeholder="e.g. SL-0044" onchange="uf(${p.id},'slCode',this.value)"></div>
          <div class="field"><label>STAGE</label><select onchange="uf(${p.id},'stage',this.value);reRender(${p.id})">${stageOpts(p.stage)}</select></div>
        </div>
        <div class="fg fg-2">
          <div class="field"><label>CLIENT LAST CONTACTED</label><input type="date" value="${p.clientLastContact||''}" onchange="uf(${p.id},'clientLastContact',this.value)"></div>
          <div class="field" style="justify-content:flex-end;padding-bottom:2px">
            <label style="visibility:hidden;font-size:9px">.</label>
            <div class="checks">${chk(p.id,'sharepointMade',p.sharepointMade,'SharePoint entry made')}</div>
          </div>
        </div>
      </div>

      <div class="sec">
        <div class="sec-label">DEADLINES & DELIVERABLES</div>
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:12px;margin-bottom:8px">
          <div style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:8px">INTERIM REPORT</div>
          <div class="fg fg-2">
            <div class="field"><label>DEADLINE</label><input type="date" value="${p.interimDeadline||''}" onchange="uf(${p.id},'interimDeadline',this.value)"></div>
            <div class="field"><label>STATUS</label><select onchange="uf(${p.id},'interimStatus',this.value)">${statusOpts(p.interimStatus)}</select></div>
          </div>
        </div>
        <div style="background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:12px;margin-bottom:8px">
          <div style="font-family:var(--mono);font-size:9px;color:var(--text3);margin-bottom:8px">FINAL REPORT</div>
          <div class="fg fg-2">
            <div class="field"><label>DEADLINE</label><input type="date" value="${p.finalDeadline||''}" onchange="uf(${p.id},'finalDeadline',this.value)"></div>
            <div class="field"><label>STATUS</label><select onchange="uf(${p.id},'finalStatus',this.value)">${statusOpts(p.finalStatus)}</select></div>
          </div>
        </div>
        <div class="field"><label>NEXT ACTION</label><input value="${p.nextAction||''}" onchange="uf(${p.id},'nextAction',this.value)"></div>
      </div>

      <div class="sec">
        <div class="sec-label">INTERNAL RESOURCES</div>
        <div class="fg fg-4">
          <div class="field"><label>ORIGINATOR</label><input value="${p.originator||''}" placeholder="Name" onchange="uf(${p.id},'originator',this.value)"></div>
          <div class="field"><label>CLIENT MANAGER</label><input value="${p.clientManager||''}" placeholder="Name" onchange="uf(${p.id},'clientManager',this.value)"></div>
          <div class="field"><label>PROJECT LEADER</label><input value="${p.projectLeader||''}" placeholder="Name" onchange="uf(${p.id},'projectLeader',this.value)"></div>
          <div class="field"><label>RESEARCHER</label><input value="${p.researcher||''}" placeholder="Name" onchange="uf(${p.id},'researcher',this.value)"></div>
        </div>
      </div>

      <div class="sec">
        <div class="sec-label">EXTERNAL RESOURCES</div>
        ${p.sc1Name ? `<div class="subcon-block">
          <div class="subcon-num">EXTERNAL RESOURCE 01</div>
          <button class="subcon-remove" onclick="uf(${p.id},'sc1Name','');reRender(${p.id})">remove</button>
          <div class="fg fg-2">
            <div class="field"><label>NAME / VENDOR</label><input value="${p.sc1Name||''}" onchange="uf(${p.id},'sc1Name',this.value)"></div>
            <div class="field"><label>DELIVERABLE</label><input value="${p.sc1Deliverable||''}" onchange="uf(${p.id},'sc1Deliverable',this.value)"></div>
          </div>
          <div class="fg fg-2">
            <div class="field"><label>DEADLINE</label><input type="date" value="${p.sc1Deadline||''}" onchange="uf(${p.id},'sc1Deadline',this.value)"></div>
            <div class="field"><label>PO NUMBER</label><input value="${p.sc1PO||''}" placeholder="e.g. PO-4421" onchange="uf(${p.id},'sc1PO',this.value)"></div>
          </div>
          <div class="checks">
            ${chk(p.id,'sc1Briefed',p.sc1Briefed,'Briefed & confirmed')}
            ${chk(p.id,'sc1InvReceived',p.sc1InvReceived,'Invoice received')}
            ${chk(p.id,'sc1InvProcessed',p.sc1InvProcessed,'Invoice processed')}
          </div>
        </div>` : ''}
        ${sc2Section}
        ${addSc}
      </div>

      <div class="sec">
        <div class="sec-label">DATABASE USAGE</div>
        <div class="checks">${chk(p.id,'dbUsed',p.dbUsed,'Database used on this engagement')}</div>
        ${dbFields}
      </div>

      <div class="sec">
        <div class="sec-label">ADMIN & COMMERCIAL</div>
        <div class="field" style="margin-bottom:10px"><label>NOTES</label><input value="${p.notes||''}" onchange="uf(${p.id},'notes',this.value)"></div>
        <div class="checks" style="margin-bottom:8px">${chk(p.id,'billingReady',p.billingReady,'Billing ready')}</div>
        ${billingFields}
      </div>

      <div class="card-footer">
        <span class="save-indicator" id="save-${p.id}"></span>
        <button class="btn btn-danger" onclick="deleteProject(${p.id})">Delete</button>
      </div>
    </div>
  </div>`;
}

function reRender(id) {
  const wasOpen = document.getElementById('body-'+id)?.classList.contains('open');
  render();
  if (wasOpen) { document.getElementById('body-'+id)?.classList.add('open'); document.getElementById('chev-'+id)?.classList.add('open'); }
}

function render() {
  const list = document.getElementById('projectList');
  const filtered = currentFilter==='all' ? projects : projects.filter(p=>p.stage===currentFilter);
  if (!filtered.length) { list.innerHTML=`<div class="empty">No engagements${currentFilter!=='all'?' in this stage':''}</div>`; return; }
  const order={Delivery:0,Active:1,Proposal:2,Closed:3};
  const sorted=[...filtered].sort((a,b)=>{ if(order[a.stage]!==order[b.stage]) return order[a.stage]-order[b.stage]; if(a.finalDeadline&&b.finalDeadline) return new Date(a.finalDeadline)-new Date(b.finalDeadline); return 0; });
  list.innerHTML=sorted.map(renderCard).join('');
}

function toggleCard(id) {
  const body=document.getElementById('body-'+id),chev=document.getElementById('chev-'+id),isOpen=body.classList.contains('open');
  document.querySelectorAll('.card-body').forEach(b=>b.classList.remove('open'));
  document.querySelectorAll('.chevron').forEach(c=>c.classList.remove('open'));
  if(!isOpen){body.classList.add('open');chev.classList.add('open');}
}

function setFilter(f,el) {
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); render();
}

function switchTab(tab,el) {
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('view-'+tab).classList.add('active');
  if(tab==='dashboard') renderDashboard();
}

function renderDashboard() {
  const active=projects.filter(p=>p.stage!=='Closed');
  const counts={Proposal:0,Active:0,Delivery:0,Closed:0};
  projects.forEach(p=>counts[p.stage]++);
  const max=Math.max(...Object.values(counts),1);
  const stageColors={Proposal:'#7a6a9a',Active:'#5a8a5a',Delivery:'#c8923a',Closed:'#555'};

  const deadlines=[];
  active.forEach(p=>{
    if(p.interimDeadline&&p.interimStatus!=='Delivered'&&p.interimStatus!=='N/A') deadlines.push({name:p.name,type:'Interim',date:p.interimDeadline,days:daysFrom(p.interimDeadline)});
    if(p.finalDeadline&&p.finalStatus!=='Delivered'&&p.finalStatus!=='N/A') deadlines.push({name:p.name,type:'Final',date:p.finalDeadline,days:daysFrom(p.finalDeadline)});
  });
  deadlines.sort((a,b)=>a.days-b.days);

  const flags=[];
  active.forEach(p=>{
    if(!p.sharepointMade) flags.push({eng:p.name,text:'SharePoint entry not made'});
    if(!p.projectCode) flags.push({eng:p.name,text:'Project code missing'});
    if(!p.slCode) flags.push({eng:p.name,text:'SL code missing'});
    if(p.billingReady&&!p.invoiceInitiated) flags.push({eng:p.name,text:'Billing ready — invoice not initiated with finance'});
    if(p.dbUsed&&p.dbPoRequired&&!p.dbPoNumber) flags.push({eng:p.name,text:'Database PO required but missing'});
    if(p.sc1Name&&!p.sc1Briefed) flags.push({eng:p.name,text:`${p.sc1Name} — not briefed`});
    if(p.sc1Name&&!p.sc1PO) flags.push({eng:p.name,text:`${p.sc1Name} — no PO`});
    if(p.sc1InvReceived&&!p.sc1InvProcessed) flags.push({eng:p.name,text:`${p.sc1Name} — invoice not processed`});
    if(p.sc2Name&&!p.sc2Briefed) flags.push({eng:p.name,text:`${p.sc2Name} — not briefed`});
    if(p.sc2Name&&!p.sc2PO) flags.push({eng:p.name,text:`${p.sc2Name} — no PO`});
    if(p.sc2InvReceived&&!p.sc2InvProcessed) flags.push({eng:p.name,text:`${p.sc2Name} — invoice not processed`});
  });

  const allScs=[];
  active.forEach(p=>{ if(p.sc1Name) allScs.push({eng:p.name,name:p.sc1Name,del:p.sc1Deliverable,dl:p.sc1Deadline,po:p.sc1PO,briefed:p.sc1Briefed,invR:p.sc1InvReceived,invP:p.sc1InvProcessed}); if(p.sc2Name) allScs.push({eng:p.name,name:p.sc2Name,del:p.sc2Deliverable,dl:p.sc2Deadline,po:p.sc2PO,briefed:p.sc2Briefed,invR:p.sc2InvReceived,invP:p.sc2InvProcessed}); });

  document.getElementById('dashGrid').innerHTML=`
    <div class="dash-card">
      <div class="dash-card-title">STAGE OVERVIEW</div>
      <div class="stage-bars">
        ${Object.entries(counts).map(([k,v])=>`<div class="sbar"><span class="sbar-label">${k}</span><div class="sbar-track"><div class="sbar-fill" style="width:${Math.round(v/max*100)}%;background:${stageColors[k]}"></div></div><span class="sbar-count">${v}</span></div>`).join('')}
      </div>
    </div>
    <div class="dash-card">
      <div class="dash-card-title">OUTSTANDING FLAGS</div>
      ${flags.length===0?`<div class="empty" style="padding:1rem;font-size:11px">All clear</div>`:`<div class="flag-list">${flags.map(f=>`<div class="flag-item"><div class="flag-dot"></div><div class="flag-text">${f.text}<br><span class="flag-eng">${f.eng.length>42?f.eng.slice(0,42)+'…':f.eng}</span></div></div>`).join('')}</div>`}
    </div>
    <div class="dash-card full">
      <div class="dash-card-title">DEADLINE TIMELINE</div>
      ${deadlines.length===0?`<div class="empty" style="padding:1rem;font-size:11px">No upcoming deadlines</div>`:`<div class="tl-list">${deadlines.map(d=>`<div class="tl-item"><div class="tl-dot" style="background:${dotColor(d.days)}"></div><span class="tl-name">${d.name.length>52?d.name.slice(0,52)+'…':d.name}</span><span class="tl-type">${d.type}</span><span class="tl-date">${fmtDate(d.date)}</span><span class="tl-days" style="color:${dotColor(d.days)}">${d.days<0?Math.abs(d.days)+'d overdue':d.days===0?'TODAY':d.days+'d'}</span></div>`).join('')}</div>`}
    </div>
    <div class="dash-card full">
      <div class="dash-card-title">SUBCONTRACTOR STATUS</div>
      ${allScs.length===0?`<div class="empty" style="padding:1rem;font-size:11px">No external resources on active engagements</div>`:`<div class="sc-wrap"><table><thead><tr><th>VENDOR</th><th>ENGAGEMENT</th><th>DELIVERABLE</th><th>DEADLINE</th><th>BRIEFED</th><th>PO</th><th>INV REC</th><th>INV PROC</th></tr></thead><tbody>${allScs.map(s=>`<tr><td>${s.name||'—'}</td><td style="color:var(--text3)">${s.eng.length>28?s.eng.slice(0,28)+'…':s.eng}</td><td style="color:var(--text3)">${s.del||'—'}</td><td>${fmtDate(s.dl)}</td><td><span class="sc-pill ${s.briefed?'sc-yes':'sc-no'}">${s.briefed?'YES':'NO'}</span></td><td>${s.po||'<span style="color:var(--red);font-size:10px">MISSING</span>'}</td><td><span class="sc-pill ${s.invR?'sc-yes':'sc-no'}">${s.invR?'YES':'NO'}</span></td><td><span class="sc-pill ${s.invP?'sc-yes':'sc-no'}">${s.invP?'YES':'NO'}</span></td></tr>`).join('')}</tbody></table></div>`}
    </div>`;
}

async function sendDigest() {
  const btn=document.getElementById('digestBtn');
  btn.disabled=true; btn.textContent='Sending…';
  try {
    await apiPost({ action:'sendDigest' });
    showToast('Digest sent to your Gmail');
  } catch(e) { showToast('Could not send — check Apps Script logs'); }
  btn.disabled=false; btn.textContent='Send digest now';
}

function showToast(msg,dur=3000) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

loadAll();
</script>
</body>
</html>
