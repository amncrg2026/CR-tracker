<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CR Engagement Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f4f5f7;
  --surface: #ffffff;
  --surface2: #f0f2f5;
  --border: #e2e6ed;
  --border2: #c8d0db;
  --text: #1a2332;
  --text2: #4a5568;
  --text3: #8a96a8;
  --navy: #1e3a5f;
  --navy2: #2a4f7c;
  --navy3: #3d6494;
  --navy-light: #e8eef6;
  --navy-mid: #b8cce0;
  --red: #c0392b;
  --red-light: #fdf0ee;
  --amber: #d68910;
  --amber-light: #fef9e7;
  --green: #1e7e4a;
  --green-light: #eafaf1;
  --purple: #6c5ce7;
  --purple-light: #f0eeff;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; line-height: 1.7; min-height: 100vh; }

.app { display: grid; grid-template-rows: auto 1fr; min-height: 100vh; }
.topbar { background: var(--navy); border-bottom: 1px solid var(--navy2); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 52px; position: sticky; top: 0; z-index: 100; }
.topbar-left { display: flex; align-items: center; gap: 2rem; }
.logo { font-family: var(--mono); font-size: 12px; color: #a8c4e0; letter-spacing: 0.1em; font-weight: 500; }
.nav { display: flex; }
.nav-btn { font-family: var(--sans); font-size: 12px; padding: 0 16px; height: 52px; background: transparent; border: none; border-bottom: 2px solid transparent; color: rgba(255,255,255,0.55); cursor: pointer; transition: color 0.15s; }
.nav-btn:hover { color: rgba(255,255,255,0.85); }
.nav-btn.active { color: #fff; border-bottom-color: #a8c4e0; }
.topbar-right { display: flex; align-items: center; gap: 12px; }
.sync-status { font-family: var(--mono); font-size: 10px; color: rgba(255,255,255,0.4); }
.sync-status.ok { color: #6fcf97; }
.sync-status.err { color: #eb5757; }
.main { padding: 2rem; max-width: 1200px; margin: 0 auto; width: 100%; }

.btn { font-family: var(--sans); font-size: 12px; padding: 7px 16px; border: 1px solid var(--border2); border-radius: 4px; background: var(--surface); color: var(--text2); cursor: pointer; transition: all 0.15s; }
.btn:hover { border-color: var(--navy3); color: var(--navy); }
.btn-navy { background: var(--navy); border-color: var(--navy); color: #fff; }
.btn-navy:hover { background: var(--navy2); border-color: var(--navy2); color: #fff; }
.btn-danger { border-color: #e8c4c0; color: var(--red); background: var(--red-light); }
.btn-danger:hover { background: #f9e0dd; border-color: var(--red); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; }

.view { display: none; }
.view.active { display: block; }

.tracker-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
.tracker-header h2 { font-size: 15px; font-weight: 500; }
.filters { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
.filter-btn { font-family: var(--mono); font-size: 10px; padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface); cursor: pointer; color: var(--text3); letter-spacing: 0.04em; transition: all 0.15s; }
.filter-btn:hover { border-color: var(--navy-mid); color: var(--navy2); }
.filter-btn.active { border-color: var(--navy); color: var(--navy); background: var(--navy-light); font-weight: 500; }

.projects { display: flex; flex-direction: column; gap: 8px; }
.project-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; transition: box-shadow 0.15s, border-color 0.15s; }
.project-card:hover { border-color: var(--border2); box-shadow: 0 2px 8px rgba(30,58,95,0.06); }
.card-header { display: flex; align-items: center; gap: 12px; padding: 12px 16px; cursor: pointer; }
.card-header:hover { background: #fafbfc; }
.stage-pill { font-family: var(--mono); font-size: 9px; padding: 3px 9px; border-radius: 20px; font-weight: 500; letter-spacing: 0.07em; white-space: nowrap; }
.pill-proposal { background: var(--purple-light); color: var(--purple); border: 1px solid #d4d0f8; }
.pill-active { background: var(--green-light); color: var(--green); border: 1px solid #b8e8cc; }
.pill-delivery { background: var(--amber-light); color: var(--amber); border: 1px solid #f5dfa0; }
.pill-closed { background: #f5f5f5; color: #999; border: 1px solid #e0e0e0; }
.card-name { flex: 1; font-size: 14px; color: var(--text); font-weight: 400; }
.card-client { font-size: 12px; color: var(--text3); }
.deadline-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.card-deadline { font-family: var(--mono); font-size: 11px; color: var(--text3); white-space: nowrap; }
.chevron { font-size: 10px; color: var(--text3); transition: transform 0.2s; }
.chevron.open { transform: rotate(180deg); }

.card-body { border-top: 1px solid var(--border); padding: 20px; display: none; background: #fafbfc; }
.card-body.open { display: block; }
.sec { margin-bottom: 20px; }
.sec:last-child { margin-bottom: 0; }
.sec-label { font-family: var(--mono); font-size: 10px; color: var(--navy3); letter-spacing: 0.12em; margin-bottom: 12px; padding-bottom: 6px; border-bottom: 1px solid var(--border); font-weight: 500; }
.fg { display: grid; gap: 8px; margin-bottom: 8px; }
.fg-2 { grid-template-columns: 1fr 1fr; }
.fg-3 { grid-template-columns: 1fr 1fr 1fr; }
.fg-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-family: var(--mono); font-size: 10px; color: var(--text3); letter-spacing: 0.06em; }
.field input, .field select, .field textarea {
  font-family: var(--sans); font-size: 13px; padding: 7px 10px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 4px; color: var(--text); width: 100%;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.field input:focus, .field select:focus, .field textarea:focus { outline: none; border-color: var(--navy3); box-shadow: 0 0 0 3px rgba(30,58,95,0.08); }
.field input:disabled { opacity: 0.4; cursor: not-allowed; background: var(--surface2); }
.field textarea { resize: vertical; min-height: 52px; line-height: 1.5; }

.checks { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 4px; }
.check { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text2); cursor: pointer; }
.check input[type=checkbox] { width: 13px; height: 13px; accent-color: var(--navy); cursor: pointer; }
.check.on { color: var(--green); }

.subcon-block { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 14px; margin-bottom: 8px; position: relative; }
.subcon-num { font-family: var(--mono); font-size: 10px; color: var(--navy3); letter-spacing: 0.08em; margin-bottom: 10px; font-weight: 500; }
.subcon-remove { position: absolute; top: 12px; right: 12px; font-size: 11px; color: var(--text3); cursor: pointer; background: none; border: none; font-family: var(--mono); }
.subcon-remove:hover { color: var(--red); }
.add-subcon { width: 100%; padding: 8px; border: 1px dashed var(--border2); border-radius: 4px; background: transparent; color: var(--text3); font-size: 12px; cursor: pointer; text-align: left; margin-top: 4px; transition: all 0.15s; }
.add-subcon:hover { border-color: var(--navy3); color: var(--navy); background: var(--navy-light); }

.db-block { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 14px; margin-bottom: 8px; position: relative; }
.db-num { font-family: var(--mono); font-size: 10px; color: var(--navy3); letter-spacing: 0.08em; margin-bottom: 10px; font-weight: 500; }
.db-remove { position: absolute; top: 12px; right: 12px; font-size: 11px; color: var(--text3); cursor: pointer; background: none; border: none; font-family: var(--mono); }
.db-remove:hover { color: var(--red); }

.billing-sub { margin-top: 8px; padding: 12px 14px; background: var(--navy-light); border: 1px solid var(--navy-mid); border-radius: 4px; }
.billing-sub p { font-size: 11px; color: var(--navy2); margin-bottom: 8px; }

.card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
.save-indicator { font-family: var(--mono); font-size: 10px; color: var(--text3); }
.save-indicator.saving { color: var(--amber); }
.save-indicator.saved { color: var(--green); }

.dash-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.dash-card { background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 20px; }
.dash-card.full { grid-column: 1 / -1; }
.dash-card-title { font-family: var(--mono); font-size: 10px; color: var(--navy3); letter-spacing: 0.12em; margin-bottom: 16px; font-weight: 500; }

.stage-bars { display: flex; flex-direction: column; gap: 12px; }
.sbar { display: flex; align-items: center; gap: 12px; }
.sbar-label { font-size: 12px; color: var(--text2); width: 64px; flex-shrink: 0; }
.sbar-track { flex: 1; height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.sbar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
.sbar-count { font-family: var(--mono); font-size: 11px; color: var(--text2); width: 20px; text-align: right; }

.tl-list { display: flex; flex-direction: column; gap: 6px; }
.tl-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; background: var(--surface2); border-radius: 4px; border: 1px solid var(--border); }
.tl-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.tl-name { flex: 1; font-size: 12px; color: var(--text); }
.tl-type { font-family: var(--mono); font-size: 9px; color: var(--text3); }
.tl-date { font-family: var(--mono); font-size: 10px; color: var(--text2); }
.tl-days { font-family: var(--mono); font-size: 10px; font-weight: 500; white-space: nowrap; }

.flag-list { display: flex; flex-direction: column; gap: 6px; }
.flag-item { display: flex; align-items: flex-start; gap: 8px; padding: 9px 12px; background: var(--red-light); border: 1px solid #f0cac6; border-radius: 4px; }
.flag-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); flex-shrink: 0; margin-top: 5px; }
.flag-text { font-size: 11px; color: var(--text); line-height: 1.5; }
.flag-eng { font-size: 10px; color: var(--text3); font-family: var(--mono); }

.sc-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; }
th { font-family: var(--mono); font-size: 10px; color: var(--navy3); letter-spacing: 0.08em; text-align: left; padding: 0 10px 10px 0; border-bottom: 1px solid var(--border); white-space: nowrap; font-weight: 500; }
td { font-size: 12px; color: var(--text); padding: 9px 10px 9px 0; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafbfc; }
.sc-pill { font-family: var(--mono); font-size: 9px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
.sc-yes { background: var(--green-light); color: var(--green); }
.sc-no { background: var(--red-light); color: var(--red); }

.empty { text-align: center; padding: 2.5rem; color: var(--text3); font-size: 13px; border: 1px dashed var(--border2); border-radius: 6px; background: var(--surface); }
.loading { text-align: center; padding: 3rem; color: var(--text3); font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; }

.digest-bar { display: flex; align-items: center; justify-content: space-between; background: var(--navy); border-radius: 6px; padding: 14px 20px; margin-bottom: 1.5rem; }
.digest-info { font-size: 12px; color: rgba(255,255,255,0.7); }
.digest-info strong { color: #a8c4e0; font-weight: 400; }
.digest-btn { font-size: 12px; padding: 7px 16px; cursor: pointer; border: 1px solid rgba(255,255,255,0.3); border-radius: 4px; background: transparent; color: #fff; transition: all 0.15s; }
.digest-btn:hover { background: rgba(255,255,255,0.1); }
.digest-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.toast { position: fixed; bottom: 24px; right: 24px; background: var(--navy); border-radius: 4px; padding: 10px 18px; font-size: 12px; color: #fff; z-index: 999; opacity: 0; transform: translateY(8px); transition: all 0.2s; pointer-events: none; font-family: var(--mono); }
.toast.show { opacity: 1; transform: translateY(0); }

@media (max-width: 768px) {
  .main { padding: 1rem; }
  .dash-grid { grid-template-columns: 1fr; }
  .fg-4 { grid-template-columns: 1fr 1fr; }
  .fg-3 { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">CR // TRACKER</div>
      <nav class="nav">
        <button class="nav-btn active" onclick="switchTab('tracker',this)">Engagements</button>
        <button class="nav-btn" onclick="switchTab('dashboard',this)">Dashboard</button>
      </nav>
    </div>
    <div class="topbar-right">
      <span class="sync-status" id="syncStatus">connecting...</span>
      <button class="btn btn-navy" onclick="addProject()">+ New engagement</button>
    </div>
  </div>

  <div class="main">
    <div class="view active" id="view-tracker">
      <div class="tracker-header"><h2>Active engagements</h2></div>
      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all',this)">ALL</button>
        <button class="filter-btn" onclick="setFilter('Proposal',this)">PROPOSAL</button>
        <button class="filter-btn" onclick="setFilter('Active',this)">ACTIVE</button>
        <button class="filter-btn" onclick="setFilter('Delivery',this)">DELIVERY</button>
        <button class="filter-btn" onclick="setFilter('Closed',this)">CLOSED</button>
      </div>
      <div id="projectList"><div class="loading">LOADING ENGAGEMENTS...</div></div>
    </div>

    <div class="view" id="view-dashboard">
      <div class="digest-bar">
        <div class="digest-info"><strong>Monday digest</strong> — scheduled 08:00 via Gmail &nbsp;·&nbsp; Deadline alerts fire at 10:00 on due dates</div>
        <button class="digest-btn" id="digestBtn" onclick="sendDigest()">Send digest now</button>
      </div>
      <div class="dash-grid" id="dashGrid"><div class="loading" style="grid-column:1/-1">LOADING DASHBOARD...</div></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbwkFfqxKIgFlqea0Q68OMsDN32VN36VpNcdkIGQ1DezMinJJaKxmcCfpLqi_9LbHu22/exec';
let projects = [];
let nextId = 1;
let currentFilter = 'all';
let saveTimers = {};

function parseJSON(val, fallback) {
  try { return JSON.parse(val) || fallback; } catch(e) { return fallback; }
}

async function apiFetch(params) {
  const r = await fetch(API + '?' + new URLSearchParams(params));
  return r.json();
}

async function apiPost(body) {
  const r = await fetch(API, { method:'POST', body: JSON.stringify(body) });
  return r.json();
}

async function loadAll() {
  setSyncStatus('syncing...','');
  try {
    const data = await apiFetch({ action:'getAll' });
    projects = data.map(fixTypes);
    if (projects.length) nextId = Math.max(...projects.map(p=>Number(p.id)||0)) + 1;
    setSyncStatus('synced','ok');
    render();
    if (document.getElementById('view-dashboard').classList.contains('active')) renderDashboard();
  } catch(e) {
    setSyncStatus('offline','err');
    render();
  }
}

function fixTypes(p) {
  const bools = ['sharepointMade','billingReady','invoiceInitiated'];
  bools.forEach(k => { p[k] = p[k]==='TRUE'||p[k]===true||p[k]==='true'; });
  p.subcontractors = parseJSON(p.subcontractors, []);
  p.databases = parseJSON(p.databases, []);
  return p;
}

function setSyncStatus(msg, cls) {
  const el = document.getElementById('syncStatus');
  el.textContent = msg; el.className = 'sync-status'+(cls?' '+cls:'');
}

async function saveProject(id) {
  const p = projects.find(x=>x.id==id);
  if (!p) return;
  const ind = document.getElementById('save-'+id);
  if (ind) { ind.textContent='saving...'; ind.className='save-indicator saving'; }
  setSyncStatus('saving...','');
  try {
    const payload = { ...p, subcontractors: JSON.stringify(p.subcontractors), databases: JSON.stringify(p.databases) };
    await apiPost({ action:'save', data:payload });
    if (ind) { ind.textContent='saved'; ind.className='save-indicator saved'; setTimeout(()=>{ if(ind){ind.textContent='';ind.className='save-indicator';}},2000); }
    setSyncStatus('synced','ok');
  } catch(e) {
    if (ind) { ind.textContent='save failed'; ind.className='save-indicator'; }
    setSyncStatus('offline','err');
  }
}

function scheduleSave(id) {
  clearTimeout(saveTimers[id]);
  saveTimers[id] = setTimeout(()=>saveProject(id), 1200);
}

async function deleteProject(id) {
  if (!confirm('Delete this engagement?')) return;
  projects = projects.filter(x=>x.id!=id);
  render();
  try { await apiPost({ action:'delete', id:String(id) }); setSyncStatus('synced','ok'); }
  catch(e) { setSyncStatus('offline','err'); }
}

function blankProject(id) {
  return { id, name:'', client:'', stage:'Proposal', projectCode:'', slCode:'', sharepointMade:false, clientLastContact:'', interimDeadline:'', interimStatus:'Not started', finalDeadline:'', finalStatus:'Not started', nextAction:'', originator:'', clientManager:'', projectLeader:'', researcher:'', subcontractors:[], databases:[], billingReady:false, invoiceInitiated:false, notes:'' };
}

function addProject() {
  const p = blankProject(nextId++);
  projects.unshift(p);
  render();
  setTimeout(()=>{ const c=document.getElementById('card-'+p.id); if(c){ c.scrollIntoView({behavior:'smooth'}); setTimeout(()=>toggleCard(p.id),300); }},100);
}

function uf(id, field, value) {
  const p = projects.find(x=>x.id==id);
  if (p) { p[field]=value; scheduleSave(id); }
}

function updateSubcon(id, idx, field, value) {
  const p = projects.find(x=>x.id==id);
  if (p && p.subcontractors[idx]) { p.subcontractors[idx][field]=value; scheduleSave(id); }
}

function addSubcon(id) {
  const p = projects.find(x=>x.id==id);
  if (!p) return;
  p.subcontractors.push({ name:'', briefed:false, deliverable:'', deadline:'', po:'', invoiceReceived:false, invoiceProcessed:false });
  scheduleSave(id); reRender(id);
}

function removeSubcon(id, idx) {
  const p = projects.find(x=>x.id==id);
  if (!p) return;
  p.subcontractors.splice(idx,1);
  scheduleSave(id); reRender(id);
}

function updateDb(id, idx, field, value) {
  const p = projects.find(x=>x.id==id);
  if (p && p.databases[idx]) { p.databases[idx][field]=value; scheduleSave(id); }
}

function addDb(id) {
  const p = projects.find(x=>x.id==id);
  if (!p) return;
  p.databases.push({ name:'', cost:'', poRequired:false, poNumber:'' });
  scheduleSave(id); reRender(id);
}

function removeDb(id, idx) {
  const p = projects.find(x=>x.id==id);
  if (!p) return;
  p.databases.splice(idx,1);
  scheduleSave(id); reRender(id);
}

function displayName(p) {
  const codes = [p.projectCode, p.slCode].filter(Boolean).join(' — ');
  return codes ? `${p.name||'Untitled'} [${codes}]` : (p.name||'Untitled');
}

function daysFrom(d) { return d ? Math.ceil((new Date(d)-new Date())/86400000) : null; }
function fmtDate(d) { if(!d) return '—'; return new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }
function dotColor(days) { if(days===null) return '#ccc'; if(days<0) return '#c0392b'; if(days<=7) return '#d68910'; return '#1e7e4a'; }
function stageClass(s) { return {Proposal:'pill-proposal',Active:'pill-active',Delivery:'pill-delivery',Closed:'pill-closed'}[s]||'pill-proposal'; }
function statusOpts(c) { return ['Not started','In progress','Delivered','N/A'].map(s=>`<option ${c===s?'selected':''}>${s}</option>`).join(''); }
function stageOpts(c) { return ['Proposal','Active','Delivery','Closed'].map(s=>`<option ${c===s?'selected':''}>${s}</option>`).join(''); }

function chk(id, field, val, label) {
  const on = val===true||val==='TRUE'||val==='true';
  return `<label class="check ${on?'on':''}"><input type="checkbox" ${on?'checked':''} onchange="uf(${id},'${field}',this.checked);this.parentElement.className='check '+(this.checked?'on':'')">${label}</label>`;
}

function chkSc(id, idx, field, val, label) {
  const on = val===true||val==='TRUE'||val==='true';
  return `<label class="check ${on?'on':''}"><input type="checkbox" ${on?'checked':''} onchange="updateSubcon(${id},${idx},'${field}',this.checked);this.parentElement.className='check '+(this.checked?'on':'')">${label}</label>`;
}

function chkDb(id, idx, field, val, label) {
  const on = val===true||val==='TRUE'||val==='true';
  return `<label class="check ${on?'on':''}"><input type="checkbox" ${on?'checked':''} onchange="updateDb(${id},${idx},'${field}',this.checked);reRender(${id})">${label}</label>`;
}

function currencyOpts(selected) {
  const currencies = ['USD','SGD','IDR','AUD','EUR','GBP','JPY','MYR','THB','VND','CNY','HKD','CHF','CAD'];
  return currencies.map(c=>`<option ${c===(selected||'USD')?'selected':''}>${c}</option>`).join('');
}

function renderSubcons(p) {
  const blocks = p.subcontractors.map((sc,i)=>`
    <div class="subcon-block">
      <div class="subcon-num">EXTERNAL RESOURCE ${String(i+1).padStart(2,'0')}</div>
      <button class="subcon-remove" onclick="removeSubcon(${p.id},${i})">remove</button>
      <div class="fg fg-2">
        <div class="field"><label>NAME / VENDOR</label><input value="${sc.name||''}" onchange="updateSubcon(${p.id},${i},'name',this.value)"></div>
        <div class="field"><label>DEADLINE</label><input type="date" value="${(sc.deadline||'').toString().slice(0,10)}" onchange="updateSubcon(${p.id},${i},'deadline',this.value)"></div>
      </div>
      <div class="fg fg-2">
        <div class="field"><label>PO NUMBER</label><input value="${sc.po||''}" placeholder="e.g. PO-4421" onchange="updateSubcon(${p.id},${i},'po',this.value)"></div>
        <div class="field"><label>CURRENCY</label>
          <select onchange="updateSubcon(${p.id},${i},'currency',this.value)">${currencyOpts(sc.currency)}</select>
        </div>
      </div>
      <div class="fg fg-2">
        <div class="field"><label>PROFESSIONAL FEE</label><input value="${sc.fee||''}" placeholder="0" type="number" min="0" onchange="updateSubcon(${p.id},${i},'fee',this.value)"></div>
        <div class="field"><label>OPEs (leave blank if none)</label><input value="${sc.ope||''}" placeholder="0" type="number" min="0" onchange="updateSubcon(${p.id},${i},'ope',this.value)"></div>
      </div>
      <div class="checks">
        ${chkSc(p.id,i,'briefed',sc.briefed,'Briefed & confirmed')}
        ${chkSc(p.id,i,'invoiceReceived',sc.invoiceReceived,'Invoice received')}
        ${chkSc(p.id,i,'invoiceProcessed',sc.invoiceProcessed,'Invoice processed')}
      </div>
    </div>`).join('');
  return blocks + `<button class="add-subcon" onclick="addSubcon(${p.id})">+ Add external resource</button>`;
}

function renderDatabases(p) {
  const blocks = p.databases.map((db,i)=>`
    <div class="db-block">
      <div class="db-num">DATABASE ${String(i+1).padStart(2,'0')}</div>
      <button class="db-remove" onclick="removeDb(${p.id},${i})">remove</button>
      <div class="fg fg-3">
        <div class="field"><label>DATABASE NAME</label><input value="${db.name||''}" placeholder="e.g. World-Check" onchange="updateDb(${p.id},${i},'name',this.value)"></div>
        <div class="field"><label>COST (USD)</label><input value="${db.cost||''}" placeholder="0.00" onchange="updateDb(${p.id},${i},'cost',this.value)"></div>
        <div class="field"><label>PO NUMBER</label><input value="${db.poNumber||''}" placeholder="${db.poRequired?'Required':'N/A'}" ${!db.poRequired?'disabled':''} onchange="updateDb(${p.id},${i},'poNumber',this.value)"></div>
      </div>
      <div class="checks">${chkDb(p.id,i,'poRequired',db.poRequired,'PO required')}</div>
    </div>`).join('');
  return blocks + `<button class="add-subcon" onclick="addDb(${p.id})">+ Add database</button>`;
}

function renderCard(p) {
  const days = daysFrom(p.finalDeadline);
  const billingFields = p.billingReady ? `<div class="billing-sub"><p>Billing is ready — has invoice preparation been initiated with finance?</p><div class="checks">${chk(p.id,'invoiceInitiated',p.invoiceInitiated,'Invoice preparation initiated with finance')}</div></div>` : '';
  return `<div class="project-card" id="card-${p.id}">
    <div class="card-header" onclick="toggleCard(${p.id})">
      <span class="stage-pill ${stageClass(p.stage)}">${p.stage.toUpperCase()}</span>
      <span class="card-name">${displayName(p)}</span>
      <span class="card-client">${p.client||''}</span>
      <span class="deadline-dot" style="background:${dotColor(days)}"></span>
      <span class="card-deadline">${p.finalDeadline||'—'}</span>
      <span class="chevron" id="chev-${p.id}">▾</span>
    </div>
    <div class="card-body" id="body-${p.id}">
      <div class="sec">
        <div class="sec-label">ENGAGEMENT DETAILS</div>
        <div class="fg fg-2">
          <div class="field"><label>ENGAGEMENT NAME</label><input value="${p.name||''}" onchange="uf(${p.id},'name',this.value)"></div>
          <div class="field"><label>CLIENT</label><input value="${p.client||''}" onchange="uf(${p.id},'client',this.value)"></div>
        </div>
        <div class="fg fg-3">
          <div class="field"><label>PROJECT CODE</label><input value="${p.projectCode||''}" placeholder="e.g. SGP-2024-0091" onchange="uf(${p.id},'projectCode',this.value)"></div>
          <div class="field"><label>SL CODE</label><input value="${p.slCode||''}" placeholder="e.g. SL-0044" onchange="uf(${p.id},'slCode',this.value)"></div>
          <div class="field"><label>STAGE</label><select onchange="uf(${p.id},'stage',this.value);reRender(${p.id})">${stageOpts(p.stage)}</select></div>
        </div>
        <div class="fg fg-2">
          <div class="field"><label>CLIENT LAST CONTACTED</label><input type="date" value="${(p.clientLastContact||'').toString().slice(0,10)}" onchange="uf(${p.id},'clientLastContact',this.value)"></div>
          <div class="field" style="justify-content:flex-end;padding-bottom:2px"><label style="visibility:hidden;font-size:9px">.</label><div class="checks">${chk(p.id,'sharepointMade',p.sharepointMade,'SharePoint entry made')}</div></div>
        </div>
      </div>

      <div class="sec">
        <div class="sec-label">DEADLINES & DELIVERABLES</div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:12px;margin-bottom:8px">
          <div style="font-family:var(--mono);font-size:9px;color:var(--navy3);margin-bottom:8px;font-weight:500">INTERIM REPORT</div>
          <div class="fg fg-2">
            <div class="field"><label>DEADLINE</label><input type="date" value="${(p.interimDeadline||'').toString().slice(0,10)}" onchange="uf(${p.id},'interimDeadline',this.value)"></div>
            <div class="field"><label>STATUS</label><select onchange="uf(${p.id},'interimStatus',this.value)">${statusOpts(p.interimStatus)}</select></div>
          </div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:12px;margin-bottom:8px">
          <div style="font-family:var(--mono);font-size:9px;color:var(--navy3);margin-bottom:8px;font-weight:500">FINAL REPORT</div>
          <div class="fg fg-2">
            <div class="field"><label>DEADLINE</label><input type="date" value="${(p.finalDeadline||'').toString().slice(0,10)}" onchange="uf(${p.id},'finalDeadline',this.value)"></div>
            <div class="field"><label>STATUS</label><select onchange="uf(${p.id},'finalStatus',this.value)">${statusOpts(p.finalStatus)}</select></div>
          </div>
        </div>
        <div class="field"><label>NEXT ACTION</label><input value="${p.nextAction||''}" onchange="uf(${p.id},'nextAction',this.value)"></div>
      </div>

      <div class="sec">
        <div class="sec-label">INTERNAL RESOURCES</div>
        <div class="fg fg-4">
          <div class="field"><label>ORIGINATOR</label><input value="${p.originator||''}" placeholder="Name" onchange="uf(${p.id},'originator',this.value)"></div>
          <div class="field"><label>CLIENT MANAGER</label><input value="${p.clientManager||''}" placeholder="Name" onchange="uf(${p.id},'clientManager',this.value)"></div>
          <div class="field"><label>PROJECT LEADER</label><input value="${p.projectLeader||''}" placeholder="Name" onchange="uf(${p.id},'projectLeader',this.value)"></div>
          <div class="field"><label>RESEARCHER</label><input value="${p.researcher||''}" placeholder="Name" onchange="uf(${p.id},'researcher',this.value)"></div>
        </div>
      </div>

      <div class="sec">
        <div class="sec-label">EXTERNAL RESOURCES</div>
        ${renderSubcons(p)}
      </div>

      <div class="sec">
        <div class="sec-label">DATABASE USAGE</div>
        ${renderDatabases(p)}
      </div>

      <div class="sec">
        <div class="sec-label">ADMIN & COMMERCIAL</div>
        <div class="field" style="margin-bottom:10px"><label>NOTES</label><input value="${p.notes||''}" onchange="uf(${p.id},'notes',this.value)"></div>
        <div class="checks" style="margin-bottom:8px">${chk(p.id,'billingReady',p.billingReady,'Billing ready')}</div>
        ${billingFields}
      </div>

      <div class="card-footer">
        <span class="save-indicator" id="save-${p.id}"></span>
        <button class="btn btn-danger" onclick="deleteProject(${p.id})">Delete engagement</button>
      </div>
    </div>
  </div>`;
}

function reRender(id) {
  const wasOpen = document.getElementById('body-'+id)?.classList.contains('open');
  render();
  if (wasOpen) { document.getElementById('body-'+id)?.classList.add('open'); document.getElementById('chev-'+id)?.classList.add('open'); }
}

function render() {
  const list = document.getElementById('projectList');
  const filtered = currentFilter==='all' ? projects : projects.filter(p=>p.stage===currentFilter);
  if (!filtered.length) { list.innerHTML=`<div class="empty">No engagements${currentFilter!=='all'?' in this stage':''}</div>`; return; }
  const order={Delivery:0,Active:1,Proposal:2,Closed:3};
  const sorted=[...filtered].sort((a,b)=>{ if(order[a.stage]!==order[b.stage]) return order[a.stage]-order[b.stage]; if(a.finalDeadline&&b.finalDeadline) return new Date(a.finalDeadline)-new Date(b.finalDeadline); return 0; });
  list.innerHTML=sorted.map(renderCard).join('');
}

function toggleCard(id) {
  const body=document.getElementById('body-'+id),chev=document.getElementById('chev-'+id),isOpen=body.classList.contains('open');
  document.querySelectorAll('.card-body').forEach(b=>b.classList.remove('open'));
  document.querySelectorAll('.chevron').forEach(c=>c.classList.remove('open'));
  if(!isOpen){body.classList.add('open');chev.classList.add('open');}
}

function setFilter(f,el) {
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active'); render();
}

function switchTab(tab,el) {
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('view-'+tab).classList.add('active');
  if(tab==='dashboard') renderDashboard();
}

function renderDashboard() {
  const active=projects.filter(p=>p.stage!=='Closed');
  const counts={Proposal:0,Active:0,Delivery:0,Closed:0};
  projects.forEach(p=>counts[p.stage]++);
  const max=Math.max(...Object.values(counts),1);
  const stageColors={Proposal:'#6c5ce7',Active:'#1e7e4a',Delivery:'#d68910',Closed:'#aaa'};

  const deadlines=[];
  active.forEach(p=>{
    if(p.interimDeadline&&p.interimStatus!=='Delivered'&&p.interimStatus!=='N/A') deadlines.push({name:displayName(p),type:'Interim',date:p.interimDeadline,days:daysFrom(p.interimDeadline)});
    if(p.finalDeadline&&p.finalStatus!=='Delivered'&&p.finalStatus!=='N/A') deadlines.push({name:displayName(p),type:'Final',date:p.finalDeadline,days:daysFrom(p.finalDeadline)});
  });
  deadlines.sort((a,b)=>a.days-b.days);

  const flags=[];
  active.forEach(p=>{
    if(!p.sharepointMade) flags.push({eng:displayName(p),text:'SharePoint entry not made'});
    if(!p.projectCode) flags.push({eng:p.name,text:'Project code missing'});
    if(!p.slCode) flags.push({eng:displayName(p),text:'SL code missing'});
    if(p.billingReady&&!p.invoiceInitiated) flags.push({eng:displayName(p),text:'Billing ready — invoice not initiated with finance'});
    p.subcontractors.forEach(sc=>{
      if(!sc.briefed) flags.push({eng:displayName(p),text:`${sc.name||'Subcontractor'} — not briefed`});
      if(!sc.po) flags.push({eng:displayName(p),text:`${sc.name||'Subcontractor'} — no PO`});
      if(sc.invoiceReceived&&!sc.invoiceProcessed) flags.push({eng:displayName(p),text:`${sc.name||'Subcontractor'} — invoice not processed`});
    });
    p.databases.forEach(db=>{
      if(db.poRequired&&!db.poNumber) flags.push({eng:displayName(p),text:`${db.name||'Database'} — PO required but missing`});
    });
  });

  const allScs=[];
  active.forEach(p=>p.subcontractors.forEach(sc=>allScs.push({eng:displayName(p),sc})));

  document.getElementById('dashGrid').innerHTML=`
    <div class="dash-card full">
      <div class="dash-card-title">CURRENT STATUS & NEXT ACTIONS</div>
      ${active.length===0?`<div class="empty" style="padding:1rem;font-size:11px;border:none">No active engagements</div>`:`<div style="display:flex;flex-direction:column;gap:6px">${active.map(p=>{
        const codes=[p.projectCode,p.slCode].filter(Boolean).join(' — ');
        const stageCol={Proposal:'var(--purple)',Active:'var(--green)',Delivery:'var(--amber)',Closed:'#aaa'}[p.stage]||'#aaa';
        return `<div style="padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-left:3px solid ${stageCol};border-radius:4px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span style="font-family:var(--mono);font-size:10px;font-weight:500;color:var(--text)">${p.name||'Untitled'}${codes?' <span style="color:var(--text3)">['+codes+']</span>':''}</span>
            <span class="stage-pill ${stageClass(p.stage)}">${p.stage.toUpperCase()}</span>
            ${p.client?`<span style="font-size:11px;color:var(--text3)">— ${p.client}</span>`:''}
          </div>
          <div style="font-size:12px;color:var(--text2)">${p.nextAction?'→ '+p.nextAction:'<span style="color:var(--text3);font-style:italic">No next action recorded</span>'}</div>
        </div>`;
      }).join('')}</div>`}
    </div>
    <div class="dash-card">
      <div class="dash-card-title">STAGE OVERVIEW</div>
      <div class="stage-bars">
        ${Object.entries(counts).map(([k,v])=>`<div class="sbar"><span class="sbar-label">${k}</span><div class="sbar-track"><div class="sbar-fill" style="width:${Math.round(v/max*100)}%;background:${stageColors[k]}"></div></div><span class="sbar-count">${v}</span></div>`).join('')}
      </div>
    </div>
    <div class="dash-card">
      <div class="dash-card-title">OUTSTANDING FLAGS</div>
      ${flags.length===0?`<div class="empty" style="padding:1rem;font-size:11px;border:none">All clear</div>`:`<div class="flag-list">${flags.map(f=>`<div class="flag-item"><div class="flag-dot"></div><div class="flag-text">${f.text}<br><span class="flag-eng">${f.eng.length>42?f.eng.slice(0,42)+'…':f.eng}</span></div></div>`).join('')}</div>`}
    </div>
    <div class="dash-card full">
      <div class="dash-card-title">DEADLINE TIMELINE</div>
      ${deadlines.length===0?`<div class="empty" style="padding:1rem;font-size:11px;border:none">No upcoming deadlines</div>`:`<div class="tl-list">${deadlines.map(d=>`<div class="tl-item"><div class="tl-dot" style="background:${dotColor(d.days)}"></div><span class="tl-name">${d.name.length>52?d.name.slice(0,52)+'…':d.name}</span><span class="tl-type">${d.type}</span><span class="tl-date">${fmtDate(d.date)}</span><span class="tl-days" style="color:${dotColor(d.days)}">${d.days<0?Math.abs(d.days)+'d overdue':d.days===0?'TODAY':d.days+'d'}</span></div>`).join('')}</div>`}
    </div>
    <div class="dash-card full">
      <div class="dash-card-title">SUBCONTRACTOR STATUS</div>
      ${allScs.length===0?`<div class="empty" style="padding:1rem;font-size:11px;border:none">No external resources on active engagements</div>`:`<div class="sc-wrap"><table><thead><tr><th>VENDOR</th><th>ENGAGEMENT</th><th>CURRENCY</th><th>PROF FEE</th><th>OPEs</th><th>DEADLINE</th><th>BRIEFED</th><th>PO</th><th>INV REC</th><th>INV PROC</th></tr></thead><tbody>${allScs.map(({eng,sc})=>`<tr><td>${sc.name||'—'}</td><td style="color:var(--text3)">${eng.length>28?eng.slice(0,28)+'…':eng}</td><td style="font-family:var(--mono);font-size:10px">${sc.currency||'USD'}</td><td>${sc.fee?Number(sc.fee).toLocaleString():'—'}</td><td>${sc.ope?Number(sc.ope).toLocaleString():'—'}</td><td>${fmtDate(sc.deadline)}</td><td><span class="sc-pill ${sc.briefed?'sc-yes':'sc-no'}">${sc.briefed?'YES':'NO'}</span></td><td>${sc.po||'<span style="color:var(--red);font-size:10px;font-family:var(--mono)">MISSING</span>'}</td><td><span class="sc-pill ${sc.invoiceReceived?'sc-yes':'sc-no'}">${sc.invoiceReceived?'YES':'NO'}</span></td><td><span class="sc-pill ${sc.invoiceProcessed?'sc-yes':'sc-no'}">${sc.invoiceProcessed?'YES':'NO'}</span></td></tr>`).join('')}</tbody></table></div>`}
    </div>`;
}

async function sendDigest() {
  const btn=document.getElementById('digestBtn');
  btn.disabled=true; btn.textContent='Sending…';
  try {
    await apiPost({ action:'sendDigest' });
    showToast('Digest sent to your Gmail');
  } catch(e) { showToast('Could not send — check Apps Script logs'); }
  btn.disabled=false; btn.textContent='Send digest now';
}

function showToast(msg,dur=3000) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

loadAll();
</script>
</body>
</html>
